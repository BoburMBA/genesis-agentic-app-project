version: '3.8'

services:
  # ── Vector Database ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: genesis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Graph Database ───────────────────────────────────────────
  neo4j:
    image: neo4j:5.25-community
    container_name: genesis-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/genesis_password
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "genesis_password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Cache + Message Bus ──────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: genesis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Metadata Database ────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: genesis-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=genesis
      - POSTGRES_USER=genesis
      - POSTGRES_PASSWORD=genesis_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis -d genesis"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── GENESIS API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genesis-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://genesis:genesis_password@postgres:5432/genesis
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=genesis_password
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
